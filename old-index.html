<!DOCTYPE html>
<html>
<head>
    <title>SAPTHALA - Login Diagnostic</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #7c183c 0%, #b22234 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { color: #7c183c; margin-bottom: 20px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c183c 0%, #b22234 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124,24,60,0.3);
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        .credentials {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .credentials p {
            margin: 10px 0;
            font-size: 16px;
        }
        .credentials strong {
            color: #7c183c;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 SAPTHALA Login</h1>
        <p>Choose an option to access the admin panel:</p>
        
        <div class="credentials">
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> sapthala@2029</p>
        </div>
        
        <button class="btn btn-primary" onclick="testAndLogin()">
            🧪 Test Login & Enter Dashboard
        </button>
        
        <button class="btn btn-secondary" onclick="window.location.href='/sapthala-admin-clean.html'">
            🏠 Go to Admin Panel Directly
        </button>
        
        <button class="btn btn-secondary" onclick="bypassLogin()">
            ⚠️ Bypass Login (Skip Authentication)
        </button>
        
        <div id="result"></div>
    </div>
    
    <script>
        async function testAndLogin() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.innerHTML = '🔄 Testing login...';
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'sapthala@2029'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = '✅ Login successful! Redirecting...';
                    
                    // Store credentials
                    localStorage.setItem('sapthala_token', data.token);
                    localStorage.setItem('sapthala_logged_in', 'true');
                    localStorage.setItem('sapthala_user', JSON.stringify(data.user));
                    
                    // Redirect after 1 second
                    setTimeout(() => {
                        window.location.href = '/sapthala-admin-clean.html';
                    }, 1000);
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = '❌ Login failed: ' + (data.error || 'Unknown error');
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = '❌ Connection error: ' + error.message;
                resultDiv.style.display = 'block';
            }
        }
        
        function bypassLogin() {
            localStorage.setItem('sapthala_logged_in', 'true');
            localStorage.setItem('sapthala_token', 'BYPASS_TOKEN');
            window.location.href = '/sapthala-admin-clean.html';
        }
    </script>
</body>
</html>
