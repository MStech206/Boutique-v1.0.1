<!-- Branch Management Section -->
<div id="branchesSection" class="content-section" style="display:none;">
    <div class="section-header">
        <h2>🏢 Branch Management</h2>
        <button onclick="showCreateBranchModal()" class="btn-primary">+ Create Branch</button>
    </div>
    
    <div class="branches-grid" id="branchesGrid">
        <!-- Branches will be loaded here -->
    </div>
</div>

<!-- Create Branch Modal -->
<div id="createBranchModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Create New Branch</h2>
            <button class="modal-close" onclick="closeCreateBranchModal()">×</button>
        </div>
        <form id="createBranchForm" onsubmit="createBranch(event)">
            <div class="form-group">
                <label>Branch Name *</label>
                <input type="text" id="branchName" required placeholder="e.g., Jubilee Hills">
            </div>
            <div class="form-group">
                <label>Location *</label>
                <input type="text" id="branchLocation" required placeholder="e.g., Road No. 36, Jubilee Hills">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="branchPhone" placeholder="e.g., 9876543210">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="branchEmail" placeholder="e.g., jubileehills@sapthala.com">
            </div>
            <div class="form-actions">
                <button type="button" onclick="closeCreateBranchModal()" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Create Branch</button>
            </div>
        </form>
    </div>
</div>

<!-- Create Sub-Admin Modal -->
<div id="createSubAdminModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Create Sub-Admin</h2>
            <button class="modal-close" onclick="closeCreateSubAdminModal()">×</button>
        </div>
        <form id="createSubAdminForm" onsubmit="createSubAdmin(event)">
            <div class="form-group">
                <label>Branch *</label>
                <select id="subAdminBranch" required>
                    <option value="">Select Branch</option>
                </select>
            </div>
            <div class="form-group">
                <label>Username *</label>
                <input type="text" id="subAdminUsername" required placeholder="e.g., jubileehills_admin">
            </div>
            <div class="form-group">
                <label>Password *</label>
                <div style="display:flex;gap:10px;">
                    <input type="password" id="subAdminPassword" required placeholder="Enter password">
                    <button type="button" onclick="generatePassword()" class="btn-secondary">Generate</button>
                </div>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="showPassword" onchange="togglePasswordVisibility()">
                    Show Password
                </label>
            </div>
            <div class="form-actions">
                <button type="button" onclick="closeCreateSubAdminModal()" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Create Sub-Admin</button>
            </div>
        </form>
    </div>
</div>

<!-- Last Orders Report Section -->
<div id="lastOrdersReport" style="margin-top:30px;">
    <div class="section-header">
        <h3>📊 Last Orders Report</h3>
        <div style="display:flex;gap:10px;align-items:center;">
            <select id="reportLimit" class="form-control" style="width:120px;">
                <option value="10">Last 10</option>
                <option value="15">Last 15</option>
                <option value="20">Last 20</option>
                <option value="50">Last 50</option>
            </select>
            <select id="reportBranch" class="form-control" style="width:200px;">
                <option value="all">All Branches</option>
            </select>
            <button onclick="loadLastOrdersReport()" class="btn-primary">Generate Report</button>
            <button onclick="downloadLastOrdersCSV()" class="btn-secondary">Download CSV</button>
        </div>
    </div>
    <div id="lastOrdersReportTable"></div>
</div>

<style>
.branches-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.branch-card {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-left: 4px solid #667eea;
    transition: all 0.3s;
}

.branch-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.branch-card h3 {
    color: #667eea;
    margin-bottom: 15px;
    font-size: 20px;
}

.branch-info {
    margin: 10px 0;
    color: #666;
    font-size: 14px;
}

.branch-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.report-table {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.report-table table {
    width: 100%;
    border-collapse: collapse;
}

.report-table th {
    background: #667eea;
    color: white;
    padding: 15px;
    text-align: left;
    font-weight: 600;
}

.report-table td {
    padding: 12px 15px;
    border-bottom: 1px solid #e0e0e0;
}

.report-table tr:hover {
    background: #f8f9fa;
}

.report-summary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}

.summary-item {
    text-align: center;
}

.summary-label {
    font-size: 12px;
    opacity: 0.9;
    margin-bottom: 8px;
}

.summary-value {
    font-size: 24px;
    font-weight: 700;
}
</style>

<script>
// Branch Management Functions
async function loadBranches() {
    try {
        const response = await fetch('/api/branches', {
            headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        const data = await response.json();
        
        if (data.success) {
                displayBranches(data.branches);
                populateBranchDropdowns(data.branches);
                // Notify other admin pages that branches list changed
                try { window.dispatchEvent(new Event('branches:changed')); } catch(e) { console.warn('Could not dispatch branches:changed', e); }
        }
    } catch (error) {
        console.error('Load branches error:', error);
    }
}

function displayBranches(branches) {
    const grid = document.getElementById('branchesGrid');
    grid.innerHTML = branches.map(branch => `
        <div class="branch-card">
            <h3>${branch.branchName}</h3>
            <div class="branch-info">📍 ${branch.location}</div>
            ${branch.phone ? `<div class="branch-info">📞 ${branch.phone}</div>` : ''}
            ${branch.email ? `<div class="branch-info">✉️ ${branch.email}</div>` : ''}
            <div class="branch-info">🆔 ${branch.branchId}</div>
            <div class="branch-info">Status: ${branch.isActive ? '✅ Active' : '❌ Inactive'}</div>
            <div class="branch-actions">
                <button onclick="createSubAdminForBranch('${branch.branchId}')" class="btn-primary">+ Sub-Admin</button>
                <button onclick="editBranch('${branch._id}')" class="btn-secondary">Edit</button>
                <button onclick="deleteBranch('${branch._id}')" class="btn-danger">Delete</button>
            </div>
        </div>
    `).join('');
}

function populateBranchDropdowns(branches) {
    const selects = ['subAdminBranch', 'reportBranch'];
    selects.forEach(id => {
        const select = document.getElementById(id);
        if (select) {
            const currentValue = select.value;
            select.innerHTML = id === 'reportBranch' ? '<option value="all">All Branches</option>' : '<option value="">Select Branch</option>';
            branches.forEach(branch => {
                select.innerHTML += `<option value="${branch.branchId}">${branch.branchName}</option>`;
            });
            if (currentValue) select.value = currentValue;
        }
    });
}

function showCreateBranchModal() {
    document.getElementById('createBranchModal').classList.add('show');
}

function closeCreateBranchModal() {
    document.getElementById('createBranchModal').classList.remove('show');
    document.getElementById('createBranchForm').reset();
}

async function createBranch(event) {
    event.preventDefault();
    
    const branchData = {
        branchName: document.getElementById('branchName').value,
        location: document.getElementById('branchLocation').value,
        phone: document.getElementById('branchPhone').value,
        email: document.getElementById('branchEmail').value
    };
    
    try {
        const response = await fetch('/api/branches', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${getToken()}`
            },
            body: JSON.stringify(branchData)
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('✅ Branch created successfully!');
            closeCreateBranchModal();
            loadBranches();
            try { window.dispatchEvent(new Event('branches:changed')); } catch(e) { console.warn('Could not dispatch branches:changed', e); }
        } else {
            alert('❌ ' + data.error);
        }
    } catch (error) {
        console.error('Create branch error:', error);
        alert('❌ Failed to create branch');
    }
}

async function deleteBranch(id) {
    if (!confirm('Are you sure you want to delete this branch?')) return;
    
    try {
        const response = await fetch(`/api/branches/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('✅ Branch deleted successfully!');
            loadBranches();
            try { window.dispatchEvent(new Event('branches:changed')); } catch(e) { console.warn('Could not dispatch branches:changed', e); }
        } else {
            alert('❌ ' + data.error);
        }
    } catch (error) {
        console.error('Delete branch error:', error);
        alert('❌ Failed to delete branch');
    }
}

function createSubAdminForBranch(branchId) {
    document.getElementById('subAdminBranch').value = branchId;
    document.getElementById('createSubAdminModal').classList.add('show');
}

function closeCreateSubAdminModal() {
    document.getElementById('createSubAdminModal').classList.remove('show');
    document.getElementById('createSubAdminForm').reset();
}

function generatePassword() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%';
    let password = '';
    for (let i = 0; i < 12; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('subAdminPassword').value = password;
}

function togglePasswordVisibility() {
    const input = document.getElementById('subAdminPassword');
    input.type = document.getElementById('showPassword').checked ? 'text' : 'password';
}

async function createSubAdmin(event) {
    event.preventDefault();
    
    const subAdminData = {
        username: document.getElementById('subAdminUsername').value,
        password: document.getElementById('subAdminPassword').value,
        branch: document.getElementById('subAdminBranch').value,
        permissions: {
            canEdit: false,
            canDelete: false,
            canViewReports: true,
            canManageStaff: false,
            branchAccess: [document.getElementById('subAdminBranch').value]
        }
    };
    
    try {
        const response = await fetch('/api/admin/sub-admins', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${getToken()}`
            },
            body: JSON.stringify(subAdminData)
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('✅ Sub-admin created successfully!\\n\\nUsername: ' + subAdminData.username + '\\nPassword: ' + subAdminData.password + '\\n\\nPlease save these credentials!');
            closeCreateSubAdminModal();
        } else {
            alert('❌ ' + data.error);
        }
    } catch (error) {
        console.error('Create sub-admin error:', error);
        alert('❌ Failed to create sub-admin');
    }
}

async function loadLastOrdersReport() {
    const limit = document.getElementById('reportLimit').value;
    const branch = document.getElementById('reportBranch').value;
    
    try {
        const response = await fetch(`/api/reports/last-orders-custom?limit=${limit}&branch=${branch}`, {
            headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        
        const data = await response.json();
        
        if (data.success) {
            displayLastOrdersReport(data.orders, data.summary);
        }
    } catch (error) {
        console.error('Load report error:', error);
    }
}

function displayLastOrdersReport(orders, summary) {
    const container = document.getElementById('lastOrdersReportTable');
    
    container.innerHTML = `
        <div class="report-table">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date/Time</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Garment</th>
                        <th>Total Amount</th>
                        <th>Advance</th>
                        <th>Balance</th>
                        <th>Status</th>
                        <th>Branch</th>
                    </tr>
                </thead>
                <tbody>
                    ${orders.map(o => `
                        <tr>
                            <td><strong>${o.orderId}</strong></td>

                            <td>${new Date(o.date).toLocaleString()}</td>
                            <td>${o.customerName}</td>
                            <td>${o.customerPhone}</td>
                            <td>${o.garmentType}</td>
                            <td>₹${o.totalAmount.toLocaleString()}</td>
                            <td>₹${o.advanceAmount.toLocaleString()}</td>
                            <td>₹${o.balanceAmount.toLocaleString()}</td>
                            <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                            <td>${o.branch}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
        <div class="report-summary">
            <div class="summary-item">
                <div class="summary-label">Total Orders</div>
                <div class="summary-value">${summary.totalOrders}</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Total Amount</div>
                <div class="summary-value">₹${summary.totalAmount.toLocaleString()}</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Advance Collected</div>
                <div class="summary-value">₹${summary.totalAdvance.toLocaleString()}</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Balance Due</div>
                <div class="summary-value">₹${summary.totalBalance.toLocaleString()}</div>
            </div>
        </div>
    `;
}

function downloadLastOrdersCSV() {
    const limit = document.getElementById('reportLimit').value;
    const branch = document.getElementById('reportBranch').value;
    
    fetch(`/api/reports/last-orders-custom?limit=${limit}&branch=${branch}`, {
        headers: { 'Authorization': `Bearer ${getToken()}` }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            const csv = convertToCSV(data.orders);
            downloadCSV(csv, `last-${limit}-orders-${branch}-${Date.now()}.csv`);
        }
    });
}

function convertToCSV(orders) {
    const headers = ['Order ID', 'Date/Time', 'Customer Name', 'Phone', 'Garment Type', 'Total Amount', 'Advance', 'Balance', 'Status', 'Branch'];
    const rows = orders.map(o => [
        o.orderId,
        new Date(o.date).toLocaleString(),
        o.customerName,
        o.customerPhone,
        o.garmentType,
        o.totalAmount,
        o.advanceAmount,
        o.balanceAmount,
        o.status,
        o.branch
    ]);
    
    return [headers, ...rows].map(row => row.join(',')).join('\\n');
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
}

function getToken() {
    return localStorage.getItem('sapthala_token') || sessionStorage.getItem('sapthala_token');
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
    loadBranches();
    loadLastOrdersReport();
});
</script>
