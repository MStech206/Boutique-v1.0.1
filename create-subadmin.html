<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Sub-Admin - SAPTHALA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(102,126,234,0.3);
        }
        
        h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .password-group {
            position: relative;
        }
        
        .generate-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .generate-btn:hover {
            background: #059669;
            transform: translateY(-50%) scale(1.05);
        }
        
        .permissions {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }
        
        .permission-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .permission-item:hover {
            background: #e3f2fd;
        }
        
        .permission-item input[type="checkbox"] {
            width: auto;
            margin-right: 12px;
            transform: scale(1.3);
            accent-color: #667eea;
        }
        
        .permission-label {
            font-size: 14px;
            color: #333;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #10b981;
            display: none;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #ef4444;
            display: none;
        }
        
        .credentials-box {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        
        .credentials-box h3 {
            color: #92400e;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .credential-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: white;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        
        .credential-label {
            font-weight: 600;
            color: #666;
        }
        
        .credential-value {
            font-weight: bold;
            color: #333;
        }
        
        .copy-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"></div>
            <h1>Create Sub-Admin</h1>
            <p class="subtitle">Add a new branch administrator</p>
        </div>
        
        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>
        
        <form id="subAdminForm">
            <div class="form-group">
                <label>Branch *</label>
                <select id="branch" required>
                    <option value="">Select Branch</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Username *</label>
                <input type="text" id="username" placeholder="e.g., jubileehills_admin" required>
            </div>
            
            <div class="form-group">
                <label>Password *</label>
                <div class="password-group">
                    <input type="text" id="password" placeholder="Enter secure password" required>
                    <button type="button" class="generate-btn" onclick="generatePassword()">Generate</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Permissions</label>
                <div class="permissions">
                    <div class="permission-item">
                        <input type="checkbox" id="canViewReports" checked>
                        <label class="permission-label" for="canViewReports"> View Reports</label>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" id="canEdit">
                        <label class="permission-label" for="canEdit"> Edit Orders</label>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" id="canDelete">
                        <label class="permission-label" for="canDelete"> Delete Orders</label>
                    </div>
                    <div class="permission-item">
                        <input type="checkbox" id="canManageStaff">
                        <label class="permission-label" for="canManageStaff"> Manage Staff</label>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn-primary" id="submitBtn">
                 Create Sub-Admin
            </button>
        </form>
        
        <div id="credentialsBox" class="credentials-box">
            <h3> Sub-Admin Created Successfully!</h3>
            <div class="credential-item">
                <span class="credential-label">Username:</span>
                <span class="credential-value" id="createdUsername"></span>
                <button class="copy-btn" onclick="copyToClipboard('createdUsername')">Copy</button>
            </div>
            <div class="credential-item">
                <span class="credential-label">Password:</span>
                <span class="credential-value" id="createdPassword"></span>
                <button class="copy-btn" onclick="copyToClipboard('createdPassword')">Copy</button>
            </div>
            <div class="credential-item">
                <span class="credential-label">Branch:</span>
                <span class="credential-value" id="createdBranch"></span>
            </div>
            <p style="margin-top: 15px; color: #92400e; font-size: 13px;">
                 Please save these credentials! They won't be shown again.
            </p>
        </div>
        
        <div class="back-link">
            <a href="/admin-complete.html"> Back to Admin Panel</a>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        
        function getToken() {
            return localStorage.getItem('sapthala_token') || sessionStorage.getItem('sapthala_token');
        }
        
        // Load branches on page load
        async function loadBranches() {
            try {
                const response = await fetch(`${API_BASE}/branches`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const select = document.getElementById('branch');
                    select.innerHTML = '<option value="">Select Branch</option>' + 
                        data.branches.map(b => `<option value="${b.branchId}">${b.branchName}</option>`).join('');
                }
            } catch (error) {
                showError('Failed to load branches');
            }
        }
        
        function generatePassword() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$%';
            let password = '';
            for (let i = 0; i < 12; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').value = password;
        }
        
        document.getElementById('subAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = ' Creating...';
            
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                branch: document.getElementById('branch').value,
                permissions: {
                    canViewReports: document.getElementById('canViewReports').checked,
                    canEdit: document.getElementById('canEdit').checked,
                    canDelete: document.getElementById('canDelete').checked,
                    canManageStaff: document.getElementById('canManageStaff').checked,
                    branchAccess: [document.getElementById('branch').value]
                }
            };
            
            try {
                const response = await fetch(`${API_BASE}/admin/sub-admins`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('Sub-admin created successfully!');
                    
                    // Show credentials
                    document.getElementById('createdUsername').textContent = data.username;
                    document.getElementById('createdPassword').textContent = data.password;
                    document.getElementById('createdBranch').textContent = document.getElementById('branch').options[document.getElementById('branch').selectedIndex].text;
                    document.getElementById('credentialsBox').style.display = 'block';
                    
                    // Reset form
                    document.getElementById('subAdminForm').reset();
                } else {
                    showError(result.error || 'Failed to create sub-admin');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = ' Create Sub-Admin';
            }
        });
        
        function showSuccess(message) {
            const el = document.getElementById('successMessage');
            el.textContent = ' ' + message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }
        
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = ' ' + message;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }
        
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert(' Copied to clipboard!');
            });
        }
        
        // Initialize
        loadBranches();
    </script>
</body>
</html>
