<!DOCTYPE html>
<html>
<head>
    <title>SAPTHALA Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            border: 2px solid #dc2626;
        }
        .success {
            background: #d1fae5;
            color: #059669;
            border: 2px solid #059669;
        }
        .hidden {
            display: none;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 8px;
            font-size: 14px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🏠 SAPTHALA Login Test</h1>
        
        <div id="messageBox" class="hidden"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="username" value="admin" required>
            </div>
            
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" value="sapthala@2029" required>
            </div>
            
            <button type="submit" id="loginBtn">🚀 Test Login</button>
        </form>
        
        <div id="result" class="hidden"></div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageBox = document.getElementById('messageBox');
        const resultDiv = document.getElementById('result');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Testing...';
            messageBox.className = 'hidden';
            resultDiv.className = 'hidden';
            
            try {
                console.log('🔄 Sending login request...');
                console.log('Username:', username);
                console.log('Password:', password.substring(0, 3) + '***');
                
                const response = await fetch('http://localhost:3000/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                console.log('📥 Response status:', response.status);
                
                const data = await response.json();
                console.log('📦 Response data:', data);
                
                if (response.ok && data.success) {
                    messageBox.className = 'message success';
                    messageBox.textContent = '✅ LOGIN SUCCESSFUL!';
                    
                    resultDiv.className = '';
                    resultDiv.innerHTML = `
                        <strong>✅ Login Successful!</strong><br><br>
                        <strong>Status:</strong> ${response.status}<br>
                        <strong>Username:</strong> ${data.user.username}<br>
                        <strong>Role:</strong> ${data.user.role}<br>
                        <strong>Token:</strong> ${data.token.substring(0, 50)}...<br><br>
                        <strong>Full Response:</strong><br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    messageBox.className = 'message error';
                    messageBox.textContent = '❌ ' + (data.error || 'Login failed');
                    
                    resultDiv.className = '';
                    resultDiv.innerHTML = `
                        <strong>❌ Login Failed</strong><br><br>
                        <strong>Status:</strong> ${response.status}<br>
                        <strong>Error:</strong> ${data.error || 'Unknown error'}<br><br>
                        <strong>Full Response:</strong><br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('❌ Error:', error);
                messageBox.className = 'message error';
                messageBox.textContent = '❌ Connection Error: ' + error.message;
                
                resultDiv.className = '';
                resultDiv.innerHTML = `
                    <strong>❌ Connection Error</strong><br><br>
                    <strong>Error:</strong> ${error.message}<br><br>
                    <strong>Possible causes:</strong><br>
                    - Server not running<br>
                    - Wrong URL<br>
                    - CORS issue<br>
                    - Network problem
                `;
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '🚀 Test Login';
            }
        });
    </script>
</body>
</html>
