<!--
1. Make sure the tab-btn class matches your existing tabs
2. The showTab('branches') function should exist in your admin panel
3. If showTab doesn't exist, add this function:

function showTab(tabName) {
    // Hide all tabs
    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.style.display = 'none';
    });
    
    // Remove active class from all buttons
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Show selected tab
    const selectedTab = document.getElementById(tabName + '-tab');
    if (selectedTab) {
        selectedTab.style.display = 'block';
    }
    
    // Add active class to clicked button
    const activeBtn = document.querySelector(`[data-tab="${tabName}"]`);
    if (activeBtn) {
        activeBtn.classList.add('active');
    }
}

4. The branches-manager.js file is already created in /public/js/
5. All API endpoints are already configured in server.js
6. No database changes needed - Branch model already exists
-->
