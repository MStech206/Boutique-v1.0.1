<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - SAPTHALA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.3);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
            animation: slideDown 0.3s ease;
        }
        .error {
            background: #fef2f2;
            color: #dc2626;
            border: 2px solid #fca5a5;
        }
        .success {
            background: #d1fae5;
            color: #059669;
            border: 2px solid #86efac;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .info {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #3b82f6;
        }
        .info p {
            margin: 5px 0;
            color: #1e40af;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 SAPTHALA Login Test</h1>
        
        <div id="messageArea"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="admin" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" value="1234" required>
            </div>
            
            <button type="submit" class="btn" id="loginBtn">🚀 Test Login</button>
        </form>
        
        <div class="info">
            <p><strong>Default Credentials:</strong></p>
            <p>Username: <code>admin</code></p>
            <p>Password: <code>1234</code></p>
        </div>
    </div>

    <script>
        const messageArea = document.getElementById('messageArea');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        function showMessage(msg, type) {
            messageArea.innerHTML = `<div class="message ${type}">${msg}</div>`;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showMessage('❌ Please enter both username and password', 'error');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = '🔄 Testing...';
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success && data.token) {
                    showMessage('✅ Login successful! Token received. Redirecting to admin panel...', 'success');
                    
                    // Store credentials
                    localStorage.setItem('sapthala_logged_in', 'true');
                    localStorage.setItem('sapthala_token', data.token);
                    localStorage.setItem('sapthala_user', JSON.stringify(data.user));
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/sapthala-admin-clean.html';
                    }, 2000);
                } else {
                    showMessage(`❌ Login failed: ${data.error || 'Invalid credentials'}`, 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '🚀 Test Login';
                }
            } catch (error) {
                showMessage(`❌ Connection error: ${error.message}`, 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = '🚀 Test Login';
            }
        });
    </script>
</body>
</html>
