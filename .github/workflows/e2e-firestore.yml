name: E2E (Firestore Emulator)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Start Firestore & Auth emulators (background)
        run: |
          firebase emulators:start --only firestore,auth --project=boutique-staff-app &
          sleep 8

      - name: Start app server (background)
        env:
          FIRESTORE_EMULATOR_HOST: localhost:9000
          GCLOUD_PROJECT: boutique-staff-app
        run: |
          node server.js &
          sleep 6

      - name: Wait for server
        run: |
          for i in {1..20}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || true)
            echo "server status: $status"
            if [ "$status" = "200" ]; then exit 0; fi
            sleep 2
          done
          echo 'Server did not become healthy' && exit 1

      - name: Run Firestore ↔ Mongo reconciliation check (non-fix)
        run: |
          node scripts/reconcile-orders-firestore-mongo.js

      - name: Run E2E verifier
        run: |
          node scripts/e2e-verify-all.js

      - name: Upload E2E logs (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            *.log
            logs/**
